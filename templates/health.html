{{define "content"}}
<div class="back-link" hx-get="/" hx-target="#content" hx-push-url="true">← Dashboard</div>
<div class="topbar">
	<div class="title">HEALTH &amp; BEAUTY</div>
</div>

<div class="split-layout">
	<div class="hero-image-card">
		<img src="/assets/health.jpg" alt="Health & Beauty">
		<div class="overlay"></div>
		<div class="label">Gym &amp; Volleyball Schedule</div>
	</div>

	<div class="rpg-card">
		<div class="corner-tr"></div><div class="corner-bl"></div>
		<div class="card-title">Diet Log — {{.Today}}</div>
		<textarea rows="10" name="content" placeholder="What did you eat today..."
			hx-post="/dietlog" hx-trigger="blur" hx-swap="none">{{.DietContent}}</textarea>
	</div>
</div>

<div class="bottom-row">
	<div class="rpg-card">
		<div class="corner-tr"></div><div class="corner-bl"></div>
		<div class="card-title">Gym Notes</div>
		{{range .GymNotes}}
		<div class="gym-day" id="gym-{{.ID}}">
			<div class="gym-day-header">
				<span class="day-name">{{.DayName}}</span>
				<div class="toggle-switch {{if .Active}}on{{end}}" hx-put="/gymnotes/{{.ID}}/toggle" hx-target="#gym-{{.ID}}" hx-swap="outerHTML">
					<div class="knob"></div>
				</div>
			</div>
			{{if .Active}}
			<div class="gym-exercises">
				<textarea rows="3" name="exercises" placeholder="Exercises, sets x reps..."
					hx-put="/gymnotes/{{.ID}}" hx-trigger="blur" hx-swap="none">{{.Exercises}}</textarea>
			</div>
			{{end}}
		</div>
		{{end}}
	</div>

	<div class="rpg-card">
		<div class="corner-tr"></div><div class="corner-bl"></div>
		<div class="card-title">Skincare Checklist — {{.Today}}</div>
		<div class="checklist">
			<label><input type="checkbox" {{if .Skincare.Cleanser}}checked{{end}} hx-put="/skincare/cleanser" hx-trigger="change" hx-swap="none"> Cleanser</label>
			<label><input type="checkbox" {{if .Skincare.Moisturizer}}checked{{end}} hx-put="/skincare/moisturizer" hx-trigger="change" hx-swap="none"> Moisturizer</label>
			<label><input type="checkbox" {{if .Skincare.SPF}}checked{{end}} hx-put="/skincare/spf" hx-trigger="change" hx-swap="none"> SPF</label>
			<label><input type="checkbox" {{if .Skincare.Serum}}checked{{end}} hx-put="/skincare/serum" hx-trigger="change" hx-swap="none"> Night Serum</label>
		</div>

		<div class="card-title" style="margin-top:16px;">Hair Care Notes</div>
		<textarea rows="4" name="content" placeholder="Hair care routine..."
			hx-post="/hairnotes" hx-trigger="blur" hx-swap="none">{{.HairNotes}}</textarea>
	</div>
</div>

<div class="rpg-card">
	<div class="corner-tr"></div><div class="corner-bl"></div>
	<div class="card-title">Weekly Score</div>
	<canvas id="weeklyScoreChart" height="90"></canvas>
	<table class="edit-table" style="margin-top:14px;">
		<thead><tr><th>Week</th><th>Score (1-10)</th><th></th></tr></thead>
		<tbody id="weeklyscore-rows">
			{{range .WeeklyScores}}
			<tr id="weeklyscore-{{.ID}}">
				<td><input type="text" value="{{.WeekLabel}}" name="week_label" hx-put="/weeklyscores/{{.ID}}" hx-include="closest tr" hx-trigger="blur" hx-swap="none" placeholder="Week label"></td>
				<td><input type="number" min="1" max="10" value="{{.Score}}" name="score" hx-put="/weeklyscores/{{.ID}}" hx-include="closest tr" hx-trigger="change" hx-swap="none" onchange="window.dispatchEvent(new Event('weeklyscores-changed'))"></td>
				<td><button type="button" class="btn-small btn-danger" hx-delete="/weeklyscores/{{.ID}}" hx-target="#weeklyscore-{{.ID}}" hx-swap="outerHTML swap:0.15s" hx-on::after-request="window.dispatchEvent(new Event('weeklyscores-changed'))">✕</button></td>
			</tr>
			{{end}}
		</tbody>
	</table>
	<button type="button" class="btn-cyan btn-small" style="margin-top:8px;" hx-post="/weeklyscores" hx-target="#weeklyscore-rows" hx-swap="beforeend" hx-on::after-request="window.dispatchEvent(new Event('weeklyscores-changed'))">+ Add Week</button>
</div>

<script>
(function() {
	function readScores() {
		const labels = [];
		const data = [];
		document.querySelectorAll('#weeklyscore-rows tr').forEach(tr => {
			labels.push(tr.querySelector('input[name=week_label]').value || '—');
			data.push(parseInt(tr.querySelector('input[name=score]').value, 10) || 0);
		});
		return { labels, data };
	}
	const ctx = document.getElementById('weeklyScoreChart');
	const initial = readScores();
	window.weeklyChart = new Chart(ctx, {
		type: 'bar',
		data: {
			labels: initial.labels,
			datasets: [{
				label: 'Score',
				data: initial.data,
				backgroundColor: 'rgba(0, 229, 255, 0.35)',
				borderColor: '#00E5FF',
				borderWidth: 1
			}]
		},
		options: {
			scales: {
				y: { min: 0, max: 10, ticks: { color: '#E2E8F0' }, grid: { color: 'rgba(0,229,255,0.1)' } },
				x: { ticks: { color: '#E2E8F0' }, grid: { color: 'rgba(0,229,255,0.05)' } }
			},
			plugins: { legend: { display: false } }
		}
	});
	window.addEventListener('weeklyscores-changed', () => {
		const r = readScores();
		window.weeklyChart.data.labels = r.labels;
		window.weeklyChart.data.datasets[0].data = r.data;
		window.weeklyChart.update();
	});
})();
</script>
{{end}}
